# Amalia configuration — A9 Mega (Strix Halo).
#
# Orchestrator = local Qwen2.5-7B-Instruct (the Conductor's exact base model),
# served by llama.cpp Vulkan on :8901.
#
# Worker pool = frontier models via the copilot bridge. Workers are presented to
# the orchestrator ONLY as ordinals (Model 0/1/2) + a capability hint.
#
# IMPORTANT: keep these ordinals aligned with amalia.training.grpo_real.SMOKE_POOL_LISTING
# and _get_exec_pool(), otherwise a trained policy learns one capability map and runtime
# executes another.

server:
  host: 0.0.0.0
  port: 8900

orchestrator:
  name: qwen2.5-7b-conductor
  model: qwen2.5-7b-instruct
  base_url: http://localhost:8901/v1
  api_key: none
  temperature: 1.0          # paper decodes the Conductor at temp 1.0
  max_tokens: 1024

pool:
  - name: claude-opus-4.8                # Model 0 — general / coding / step-by-step
    model: claude-opus-4.8
    base_url: http://localhost:4141/v1
    api_key: none
    api_type: chat
    capabilities: "general problem solving, coding, step-by-step reasoning"
    temperature: 0.2
    max_tokens: 4096

  - name: gemini-3.1-pro                 # Model 1 — math / science / precise calculation
    model: gemini-3.1-pro-preview
    base_url: http://localhost:4141/v1
    api_key: none
    api_type: chat
    capabilities: "arithmetic, math, number theory, precise calculation"
    temperature: 0.1
    max_tokens: 4096

  - name: gpt-5.5-xhigh-verifier         # Model 2 — verification, via Responses API (:4142)
    model: gpt-5.5
    base_url: http://localhost:4142/v1
    api_key: none
    api_type: responses
    reasoning_effort: xhigh
    capabilities: "verification, checking answers, catching errors"
    temperature: 0.1
    max_tokens: 4096

conductor:
  max_steps: 5
  max_recursion: 1          # 1 refine/verify round; raise for more test-time compute
  parse_retries: 2
  orchestrator_temperature: 1.0
  orchestrator_max_tokens: 1024
  fallback_worker: 0
